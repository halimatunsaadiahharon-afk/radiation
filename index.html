<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>Gimik Pelancaran Korporat - ICoRSSIHS 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* --- ASAS & MOBILE OPTIMIZATION --- */
        body, html { 
            margin: 0; padding: 0; height: 100%; 
            font-family: 'Montserrat', sans-serif; 
            overflow: hidden; background: #000; color: #fff; cursor: pointer; 
            -webkit-tap-highlight-color: transparent;
        }
        
        /* FIX UNTUK MOBILE: Gambar ppp.jpg sentiasa penuh skrin */
        #setup-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; z-index: 9999; display: flex; justify-content: center; align-items: center; 
        }
        #setup-overlay img {
            width: 100%; height: 100%; object-fit: cover; /* Ini memastikan gambar tidak penyek di mobile */
            object-position: center;
        }

        #exit-btn {
            position: fixed; top: 20px; right: 20px; z-index: 10000;
            width: 40px; height: 40px; background: rgba(255, 0, 0, 0.6);
            border: 2px solid white; border-radius: 50%;
            color: white; font-weight: bold; display: flex; justify-content: center; align-items: center;
            opacity: 0; transition: opacity 1s;
        }

        #main-container { 
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; 
            z-index: 10; display: flex; justify-content: center; align-items: center;
        }

        .fullscreen-content {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: none; z-index: 1;
        }

        /* --- 10 ANIMASI BUKU KORPORAT (30 SAAT) --- */
        #book-launch-layer {
            display: none; justify-content: center; align-items: center;
            z-index: 20; background: radial-gradient(circle, #0d1b33 0%, #000 100%);
            perspective: 2500px;
        }

        .book-container {
            width: 75vw; /* Lebih responsif untuk mobile */
            max-width: 320px;
            height: auto;
            aspect-ratio: 320/460;
            position: relative;
            transform-style: preserve-3d;
            opacity: 0;
            backface-visibility: hidden;
        }

        .book-img {
            width: 100%; height: 100%; object-fit: cover;
            box-shadow: 0 0 80px rgba(0, 150, 255, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 5px;
        }

        .corporate-montage {
            animation: 
                st1 3s ease-out forwards, st2 3s linear 3s forwards,
                st3 3s ease-in-out 6s forwards, st4 3s linear 9s forwards,
                st5 3s ease 12s forwards, st6 3s ease-in-out 15s forwards,
                st7 3s ease-out 18s forwards, st8 3s ease-out 21s forwards,
                st9 3s linear 24s forwards, st10 3s ease-in 27s forwards;
        }

        @keyframes st1 { 0% { opacity: 0; transform: scale(0.3) translateY(600px); } 100% { opacity: 1; transform: scale(1) translateY(0); } }
        @keyframes st2 { 0% { transform: rotateY(0deg); } 100% { transform: rotateY(360deg); } }
        @keyframes st3 { 0% { transform: rotateY(0deg); } 100% { transform: rotateY(180deg) translateZ(50px); } }
        @keyframes st4 { 0% { transform: scale(1); } 50% { transform: scale(1.3); filter: contrast(1.5); } 100% { transform: scale(1.1); filter: contrast(1.2); } }
        @keyframes st5 { 0% { transform: rotateX(0deg); } 50% { transform: rotateX(90deg); filter: brightness(2); } 100% { transform: rotateX(0deg); } }
        @keyframes st6 { 0% { transform: rotateX(0deg); } 100% { transform: rotateX(180deg); } }
        @keyframes st7 { 0% { transform: rotateX(10deg); } 100% { transform: rotateX(-10deg) rotateY(-10deg); } }
        @keyframes st8 { 0% { transform: scale(1); } 100% { transform: scale(1.3); box-shadow: 0 0 100px #0096ff; } }
        @keyframes st9 { 0%, 100% { transform: scale(1.3) rotateZ(0); } 50% { transform: scale(1.3) rotateZ(5deg); } }
        @keyframes st10 { 0% { opacity: 1; transform: scale(1.3); } 100% { opacity: 0; transform: scale(0.5) translateY(100px); } }

        /* --- WORDING PERASMIAN (LENGKAP) --- */
        #official-card-container { 
            display: none; opacity: 0; transition: opacity 1.5s; 
            width: 100%; height: 100%; justify-content: center; align-items: center; 
            position: absolute; top: 0; left: 0; z-index: 100; background: #050a14;
        }
        
        .official-card {
            background: rgba(10, 20, 38, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px; padding: 30px; text-align: center;
            width: 85%; max-width: 1100px;
        }

        .reveal { opacity: 0; transform: translateY(30px); animation: fadeInUp 1s ease forwards; }
        @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }

        .glow-text {
            background: linear-gradient(90deg, #fff, #4facfe, #00f2fe, #ffd3a5, #fff);
            background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: textShine 5s linear infinite; display: inline-block;
        }
        @keyframes textShine { to { background-position: 200% center; } }

        .conf-title { font-size: clamp(0.7rem, 2vw, 1.5rem); text-transform: uppercase; letter-spacing: 2px; margin: 2px 0; }
        .main-theme-box { 
            font-size: clamp(1.2rem, 4vw, 3.2rem); font-weight: 900; text-transform: uppercase; 
            margin: 15px 0; line-height: 1.2; color: #fff; 
        }
        .vip-label { color: #00f2fe; font-size: 0.7rem; letter-spacing: 5px; font-weight: 700; margin-top: 20px; }
        .vip-name { font-size: clamp(1rem, 3vw, 2.2rem); font-weight: 700; margin: 5px 0; color: #fff; }
        .vip-role { color: #b0c4de; font-size: 0.9rem; font-weight: 300; }
    </style>
</head>
<body> 

    <div id="setup-overlay" onclick="startScene()">
        <img src="ppp.jpg" alt="ppp">
    </div>
    
    <div id="exit-btn" onclick="exitSystem(event)">X</div>
    
    <audio id="book-sound" preload="auto"><source src="bookaudio.mp3" type="audio/mpeg"></audio>
    <audio id="final-sound" preload="auto"><source src="audio3.mp3" type="audio/mpeg"></audio>

    <div id="main-container" onclick="handleScreenClick(event)">
        <video id="vid-place" class="fullscreen-content" src="place.mp4" playsinline loop></video>
        <video id="vid-access" class="fullscreen-content" src="access.mp4" playsinline></video>

        <div id="book-launch-layer" class="fullscreen-content">
            <div id="book-obj" class="book-container">
                <img src="cover.jpg" class="book-img" alt="Cover">
            </div>
        </div>

        <div id="official-card-container">
            <div class="official-card">
                <div class="reveal" style="animation-delay: 0.5s;">
                    <div class="conf-title">6th International Conference On</div>
                    <div class="conf-title" style="font-weight: 700;">Radiation Safety and Security In</div>
                    <div class="conf-title" style="font-weight: 900;">Healthcare Services (ICoRSSIHS) 2026</div>
                </div>
                
                <div class="reveal" style="width: 80px; height: 2px; background: rgba(255,255,255,0.2); margin: 15px auto; animation-delay: 1s;"></div>
                
                <div class="reveal main-theme-box" style="animation-delay: 1.8s;">
                    <span class="glow-text">Synergizing Science, Technology<br>And Clinical Practice Through AI</span>
                </div>

                <div class="reveal" style="animation-delay: 3s;">
                    <div class="vip-label">DIRASMIKAN OLEH</div>
                    <div class="vip-name">DR ...</div>
                    <div class="vip-role">Pengarah ....</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const vidPlace = document.getElementById('vid-place');
        const vidAccess = document.getElementById('vid-access');
        const bookLayer = document.getElementById('book-launch-layer');
        const bookObj = document.getElementById('book-obj');
        const bookSound = document.getElementById('book-sound');
        const finalSound = document.getElementById('final-sound');
        const cardContainer = document.getElementById('official-card-container');
        const exitBtn = document.getElementById('exit-btn');

        let currentPhase = 0; 

        function startScene() {
            document.getElementById('setup-overlay').style.display = 'none';
            exitBtn.style.opacity = '1'; 
            currentPhase = 1; 
            vidPlace.style.display = 'block'; vidPlace.play();
            
            const elem = document.documentElement;
            if (elem.requestFullscreen) { elem.requestFullscreen().catch(err => {}); } 
            else if (elem.webkitRequestFullscreen) { elem.webkitRequestFullscreen(); } 

            [bookSound, finalSound].forEach(s => {
                s.play().then(() => { s.pause(); s.currentTime = 0; }).catch(() => {});
            });
        }

        function handleScreenClick(event) {
            if (currentPhase === 1) {
                vidPlace.pause(); vidPlace.style.display = 'none';
                currentPhase = 2; vidAccess.style.display = 'block'; vidAccess.play();
            } else if (currentPhase === 4) {
                exitSystem(event);
            }
        }

        vidAccess.onended = () => {
            vidAccess.style.display = 'none';
            currentPhase = 3;
            bookLayer.style.display = 'flex';
            bookObj.classList.add('corporate-montage');
            bookSound.play();

            setTimeout(() => {
                bookSound.pause(); 
                bookLayer.style.display = 'none';
                showOfficialCard();
            }, 30000); 
        };

        function showOfficialCard() {
            currentPhase = 4;
            cardContainer.style.display = 'flex';
            void cardContainer.offsetWidth; 
            cardContainer.style.opacity = '1';
            finalSound.play();
        }

        function exitSystem(e) {
            if (e) e.stopPropagation();
            document.body.style.transition = "opacity 0.8s";
            document.body.style.opacity = "0";
            setTimeout(() => {
                document.body.innerHTML = ""; 
                if (document.exitFullscreen) document.exitFullscreen().catch(() => {});
                window.close();
                setTimeout(() => { window.location.href = "about:blank"; }, 100);
            }, 800);
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gimik Pelancaran ICoRSSIHS 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body, html { 
            margin: 0; padding: 0; height: 100%; 
            font-family: 'Montserrat', sans-serif; 
            overflow: hidden; background: #000; color: #fff;
            -webkit-tap-highlight-color: transparent;
        }

        #setup-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; z-index: 99999; display: flex; flex-direction: column; justify-content: center; align-items: center; 
            cursor: pointer;
        }
        #setup-overlay img { width: 100%; height: 100%; object-fit: cover; opacity: 0.6; }

        .fullscreen-content {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: none; object-fit: cover;
        }

        /* KEYPAD STYLING */
        #keypad-container {
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle, #0a1a33 0%, #000 100%);
            z-index: 100;
        }

        .display-screen {
            width: 320px; height: 80px;
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid #00f2fe;
            border-radius: 15px;
            margin-bottom: 30px;
            display: flex; justify-content: center; align-items: center;
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem; color: #00f2fe;
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.5);
        }

        .keypad-grid {
            display: grid;
            grid-template-columns: repeat(3, 80px);
            gap: 15px;
        }

        .key {
            width: 80px; height: 80px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 242, 254, 0.3);
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 1.5rem; font-weight: bold;
            cursor: pointer; transition: 0.2s;
        }

        .key:active { background: #00f2fe; color: #000; transform: scale(0.9); }

        /* ACCESS GRANTED ANIMATION */
        #status-msg {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-family: 'Orbitron', sans-serif;
            font-size: 3.5rem; font-weight: 900; color: #00ff00;
            text-shadow: 0 0 30px #00ff00;
            display: none; z-index: 200;
            text-align: center;
        }

        /* WORDING PERASMIAN (UPDATED: PERASMI REMOVED) */
        #official-card-container { 
            display: none; opacity: 0; transition: opacity 2s; 
            width: 100%; height: 100%; justify-content: center; align-items: center; 
            position: absolute; top: 0; left: 0; z-index: 400; background: #050a14;
        }
        
        .official-card { background: rgba(10, 20, 38, 0.95); border-radius: 20px; padding: 50px; text-align: center; width: 85%; max-width: 1100px; border: 1px solid rgba(255,255,255,0.1); }
        .reveal { opacity: 0; transform: translateY(20px); animation: fadeInUp 1s ease forwards; }
        @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }

        .glow-text {
            background: linear-gradient(90deg, #fff, #4facfe, #00f2fe, #ffd3a5, #fff);
            background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: textShine 5s linear infinite; display: inline-block;
        }
        @keyframes textShine { to { background-position: 200% center; } }

        .conf-title { font-size: clamp(0.9rem, 2.5vw, 1.8rem); text-transform: uppercase; letter-spacing: 3px; line-height: 1.4; }
        .main-theme-box { font-size: clamp(1.5rem, 5vw, 4rem); font-weight: 900; text-transform: uppercase; margin: 30px 0; }
    </style>
</head>
<body> 

    <div id="setup-overlay" onclick="startGimmick()">
        <img src="ppp.jpg" alt="Background">
        <p style="position: absolute; color: white; letter-spacing: 5px; font-weight: bold; bottom: 15%;">KLIK UNTUK MULA</p>
    </div>
    
    <audio id="audio-code" loop><source src="audiocode.mp3" type="audio/mpeg"></audio>
    <audio id="success-sound"><source src="https://www.soundjay.com/buttons/button-09.mp3" type="audio/mpeg"></audio>
    <audio id="final-sound" preload="auto"><source src="audio3.mp3" type="audio/mpeg"></audio>

    <div id="main-container">
        <video id="video-1" class="fullscreen-content" src="video1.mp4" playsinline></video>
        <video id="video-access" class="fullscreen-content" src="access.mp4" playsinline></video>

        <div id="keypad-container" class="fullscreen-content">
            <div style="margin-bottom: 20px; letter-spacing: 3px; color: #00f2fe; font-weight: bold;">TEKAN MANA-MANA UNTUK AKSES</div>
            <div class="display-screen" id="pin-display"></div>
            <div class="keypad-grid">
                <div class="key" onclick="handleAccessClick()">1</div>
                <div class="key" onclick="handleAccessClick()">2</div>
                <div class="key" onclick="handleAccessClick()">3</div>
                <div class="key" onclick="handleAccessClick()">4</div>
                <div class="key" onclick="handleAccessClick()">5</div>
                <div class="key" onclick="handleAccessClick()">6</div>
                <div class="key" onclick="handleAccessClick()">7</div>
                <div class="key" onclick="handleAccessClick()">8</div>
                <div class="key" onclick="handleAccessClick()">9</div>
                <div class="key" onclick="handleAccessClick()">*</div>
                <div class="key" onclick="handleAccessClick()">0</div>
                <div class="key" onclick="handleAccessClick()">#</div>
            </div>
        </div>

        <div id="status-msg">ACCESS GRANTED</div>

        <div id="official-card-container">
            <div class="official-card">
                <div class="reveal" style="animation-delay: 0.5s;">
                    <div class="conf-title">6th International Conference On</div>
                    <div class="conf-title" style="font-weight: 700; color: #00f2fe;">Radiation Safety and Security In Healthcare Services (ICoRSSIHS) 2026</div>
                </div>
                
                <div class="reveal main-theme-box" style="animation-delay: 1.5s;">
                    <span class="glow-text">Synergizing Science, Technology<br>And Clinical Practice Through AI</span>
                </div>

                </div>
        </div>
    </div>

    <script>
        const video1 = document.getElementById('video-1');
        const videoAccess = document.getElementById('video-access');
        const keypadContainer = document.getElementById('keypad-container');
        const pinDisplay = document.getElementById('pin-display');
        const statusMsg = document.getElementById('status-msg');
        const cardContainer = document.getElementById('official-card-container');
        
        const audioCode = document.getElementById('audio-code');
        const successSound = document.getElementById('success-sound');
        const finalSound = document.getElementById('final-sound');

        let isTriggered = false;

        function startGimmick() {
            document.getElementById('setup-overlay').style.display = 'none';
            audioCode.play().then(() => { audioCode.pause(); });
            
            const elem = document.documentElement;
            if (elem.requestFullscreen) { elem.requestFullscreen(); }
            
            video1.style.display = 'block';
            video1.play();
        }

        video1.onended = () => {
            video1.style.display = 'none';
            keypadContainer.style.display = 'flex';
            audioCode.currentTime = 0;
            audioCode.play();
        };

        function handleAccessClick() {
            if (isTriggered) return;
            isTriggered = true;

            audioCode.pause();
            pinDisplay.innerText = "****";
            successSound.play();
            
            keypadContainer.style.opacity = '0.4';
            keypadContainer.style.pointerEvents = 'none';
            
            setTimeout(() => {
                statusMsg.style.display = 'block';
                
                setTimeout(() => {
                    statusMsg.style.display = 'none';
                    keypadContainer.style.display = 'none';
                    videoAccess.style.display = 'block';
                    videoAccess.play();
                }, 1500);
            }, 300);
        }

        videoAccess.onended = () => {
            videoAccess.style.display = 'none';
            showOfficialCard();
        };

        function showOfficialCard() {
            cardContainer.style.display = 'flex';
            setTimeout(() => {
                cardContainer.style.opacity = '1';
                finalSound.play();
            }, 100);
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>Gimik Pelancaran Korporat - ICoRSSIHS 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body, html { 
            margin: 0; padding: 0; height: 100%; 
            font-family: 'Montserrat', sans-serif; 
            overflow: hidden; background: #000; color: #fff; cursor: pointer; 
            -webkit-tap-highlight-color: transparent;
        }
        
        #setup-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; z-index: 9999; display: flex; justify-content: center; align-items: center; 
        }

        #exit-btn {
            position: fixed; top: 20px; right: 20px; z-index: 10000;
            width: 40px; height: 40px; background: rgba(255, 0, 0, 0.6);
            border: 2px solid white; border-radius: 50%;
            color: white; font-weight: bold; display: flex; justify-content: center; align-items: center;
            opacity: 0; transition: opacity 1s;
        }

        #main-container { 
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; 
            z-index: 10; display: flex; justify-content: center; align-items: center;
        }

        .fullscreen-content {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: none; z-index: 1;
        }

        /* --- BAHAGIAN BARU: 10 ANIMASI DALAM 30 SAAT (FAST & CORPORATE) --- */
        #book-launch-layer {
            display: none; justify-content: center; align-items: center;
            z-index: 20; background: radial-gradient(circle, #0d1b33 0%, #000 100%);
            perspective: 2500px;
        }

        .book-container {
            width: 320px;
            height: 460px;
            position: relative;
            transform-style: preserve-3d;
            opacity: 0;
            backface-visibility: hidden;
        }

        .book-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            box-shadow: 0 0 80px rgba(0, 150, 255, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 5px;
        }

        /* KESAN CAHAYA "SCANNING" YANG PANTAS */
        .scan-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, transparent, rgba(0, 242, 254, 0.3), transparent);
            transform: translateY(-100%);
            animation: scanLine 2s linear infinite 5s; /* Bermula selepas intro */
            z-index: 3;
        }
        @keyframes scanLine { 0% { transform: translateY(-100%); } 100% { transform: translateY(100%); } }

        /* SIFAR PERTAMA: SIRI 10 KESAN (TEN STAGES) */
        .corporate-montage {
            animation: 
                stage1_Intro 3s cubic-bezier(0.2, 0.8, 0.2, 1) forwards,
                stage2_SpinFast 3s linear 3s forwards,
                stage3_FlipY 3s ease-in-out 6s forwards,
                stage4_GlitchZoom 3s linear 9s forwards,
                stage5_OpticalFlash 3s ease 12s forwards,
                stage6_FlipX 3s ease-in-out 15s forwards,
                stage7_TiltShift 3s ease-out 18s forwards,
                stage8_GlowExpand 3s ease-out 21s forwards,
                stage9_WobbleRotate 3s linear 24s forwards,
                stage10_ZoomOutFade 3s cubic-bezier(0.7, 0, 0.3, 1) 27s forwards;
        }

        /* Fasa 1 (0-3s): Muncul & Terapung */
        @keyframes stage1_Intro { 0% { opacity: 0; transform: scale(0.3) translateY(600px); } 100% { opacity: 1; transform: scale(1) translateY(0); } }
        /* Fasa 2 (3-6s): Pusingan Mendatar Pantas */
        @keyframes stage2_SpinFast { 0% { transform: rotateY(0deg); } 100% { transform: rotateY(360deg); } }
        /* Fasa 3 (6-9s): Balikan menegak (Flip Y) */
        @keyframes stage3_FlipY { 0% { transform: rotateY(0deg); } 100% { transform: rotateY(180deg) translateZ(50px); } }
        /* Fasa 4 (9-12s): Kesan Glitch & Mendekat (Zoom) */
        @keyframes stage4_GlitchZoom { 0% { transform: scale(1) translateZ(50px); filter: contrast(1); } 50% { transform: scale(1.3) translateZ(150px); filter: contrast(1.5); } 100% { transform: scale(1.2) translateZ(100px); filter: contrast(1.2); } }
        /* Fasa 5 (12-15s): Pusingan X dengan kesan cahaya (Flash) */
        @keyframes stage5_OpticalFlash { 0% { transform: rotateX(0deg); } 50% { transform: rotateX(90deg) scale(1.1); filter: brightness(2); } 100% { transform: rotateX(0deg); filter: brightness(1); } }
        /* Fasa 6 (15-18s): Balikan melintang (Flip X) */
        @keyframes stage6_FlipX { 0% { transform: rotateX(0deg); } 100% { transform: rotateX(180deg); } }
        /* Fasa 7 (18-21s): Condong drastic (Tilt) */
        @keyframes stage7_TiltShift { 0% { transform: rotateX(10deg) rotateY(10deg); } 100% { transform: rotateX(-10deg) rotateY(-10deg); } }
        /* Fasa 8 (21-24s): Cahaya Glow Membesar */
        @keyframes stage8_GlowExpand { 0% { transform: scale(1.1); } 100% { transform: scale(1.3) translateZ(100px); box-shadow: 0 0 100px rgba(0, 150, 255, 1); } }
        /* Fasa 9 (24-27s): Goyangan Pantas (Wobble) */
        @keyframes stage9_WobbleRotate { 0%, 100% { transform: scale(1.3) rotateZ(0deg); } 25% { transform: scale(1.3) rotateZ(5deg); } 75% { transform: scale(1.3) rotateZ(-5deg); } }
        /* Fasa 10 (27-30s): Zoom Out & Fade-out */
        @keyframes stage10_ZoomOutFade { 0% { opacity: 1; transform: scale(1.3) translateZ(100px); } 100% { opacity: 0; transform: scale(0.5) translateY(100px); } }


        /* --- STYLE WORDING (KEKAL SEPERTI SEBELUM INI) --- */
        #official-card-container { 
            display: none; opacity: 0; transition: opacity 1.5s; 
            width: 100%; height: 100%; justify-content: center; align-items: center; 
            position: absolute; top: 0; left: 0; z-index: 100; background: #050a14;
        }
        
        .official-card {
            background: rgba(10, 20, 38, 0.9);
            box-shadow: 0 0 100px rgba(0, 150, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 30px; padding: 60px 40px; text-align: center;
            backdrop-filter: blur(15px);
        }

        .reveal { opacity: 0; transform: translateY(30px); animation: fadeInUp 1s ease forwards; }
        @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }

        .glow-text {
            background: linear-gradient(90deg, #fff, #4facfe, #00f2fe, #ffd3a5, #fff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: textShine 5s linear infinite;
            display: inline-block;
        }
        @keyframes textShine { to { background-position: 200% center; } }

        .conf-title { font-size: clamp(0.9rem, 2.2vw, 1.8rem); text-transform: uppercase; letter-spacing: 3px; margin: 5px 0; }
        .main-theme-box { 
            font-size: clamp(1.5rem, 4.5vw, 3.8rem); font-weight: 900; text-transform: uppercase; 
            margin: 25px 0; line-height: 1.2; color: #fff; 
        }
        .vip-label { color: #00f2fe; font-size: 0.9rem; letter-spacing: 8px; font-weight: 700; margin-top: 35px; }
        .vip-name { font-size: clamp(1.4rem, 3.2vw, 2.6rem); font-weight: 700; margin: 10px 0; color: #fff; }
        .vip-role { color: #b0c4de; font-size: 1.2rem; font-weight: 300; letter-spacing: 1px; }
    </style>
</head>
<body> 

    <div id="setup-overlay" onclick="startScene()">
        <img src="ppp.jpg" alt="ppp" style="width: 100%; height: 100%; object-fit: cover;">
    </div>
    
    <div id="exit-btn" onclick="exitSystem(event)">X</div>
    
    <audio id="book-sound" preload="auto"><source src="bookaudio.MP3" type="audio/mpeg"></audio>
    <audio id="final-sound" preload="auto"><source src="audio3.mp3" type="audio/mpeg"></audio>

    <div id="main-container" onclick="handleScreenClick(event)">
        <video id="vid-place" class="fullscreen-content" src="place.mp4" playsinline loop></video>
        <video id="vid-access" class="fullscreen-content" src="access.mp4" playsinline></video>

        <div id="book-launch-layer" class="fullscreen-content">
            <div id="book-obj" class="book-container">
                <div class="scan-overlay"></div>
                <img src="cover.jpg" class="book-img" alt="Cover">
            </div>
        </div>

        <div id="official-card-container">
            <div class="official-card">
                
                <div class="reveal" style="animation-delay: 0.5s;">
                    <div class="conf-title">6th International Conference On</div>
                    <div class="conf-title" style="font-weight: 700;">Radiation Safety and Security In</div>
                    <div class="conf-title" style="font-weight: 900;">Healthcare Services (ICoRSSIHS) 2026</div>
                </div>
                
                <div class="reveal" style="width: 100px; height: 2px; background: rgba(255,255,255,0.2); margin: 20px auto; animation-delay: 1s;"></div>
                
                <div class="reveal main-theme-box" style="animation-delay: 1.8s;">
                    <span class="glow-text">Synergizing Science, Technology<br>And Clinical Practice Through AI</span>
                </div>

                <div class="reveal" style="animation-delay: 3s;">
                    <div class="vip-label">DIRASMIKAN OLEH</div>
                    <div class="vip-name">DR SELVANAAYAGAM SHANMUGANATHAN</div>
                    <div class="vip-role">Pengarah Hospital Baling</div>
                </div>

            </div>
        </div>
    </div>

    <script>
        const vidPlace = document.getElementById('vid-place');
        const vidAccess = document.getElementById('vid-access');
        const bookLayer = document.getElementById('book-launch-layer');
        const bookObj = document.getElementById('book-obj');
        const bookSound = document.getElementById('book-sound');
        const finalSound = document.getElementById('final-sound');
        const cardContainer = document.getElementById('official-card-container');
        const exitBtn = document.getElementById('exit-btn');

        let currentPhase = 0; 

        function startScene() {
            document.getElementById('setup-overlay').style.display = 'none';
            exitBtn.style.opacity = '1'; 
            currentPhase = 1; 
            vidPlace.style.display = 'block'; vidPlace.play();
            if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
            
            [bookSound, finalSound].forEach(s => {
                s.play().then(() => { s.pause(); s.currentTime = 0; }).catch(() => {});
            });
        }

        function handleScreenClick(event) {
            if (currentPhase === 1) {
                vidPlace.pause(); vidPlace.style.display = 'none';
                currentPhase = 2; vidAccess.style.display = 'block'; vidAccess.play();
            } else if (currentPhase === 4) {
                exitSystem(event);
            }
        }

        vidAccess.onended = () => {
            vidAccess.style.display = 'none';
            currentPhase = 3;
            bookLayer.style.display = 'flex';
            
            // Masukkan kelas animasi korporat
            bookObj.classList.add('corporate-montage');
            bookSound.play();

            // TIMER BARU: TEPAT 30 SAAT
            setTimeout(() => {
                bookSound.pause(); bookSound.currentTime = 0;
                bookLayer.style.display = 'none';
                showOfficialCard();
            }, 30000); // 30,000ms = 30 saat
        };

        function showOfficialCard() {
            currentPhase = 4;
            cardContainer.style.display = 'flex';
            void cardContainer.offsetWidth; 
            cardContainer.style.opacity = '1';
            finalSound.play();
        }

        function exitSystem(e) {
            if (e) e.stopPropagation();
            document.body.style.transition = "opacity 0.8s";
            document.body.style.opacity = "0";
            setTimeout(() => {
                document.body.innerHTML = ""; 
                if (document.exitFullscreen) document.exitFullscreen().catch(() => {});
                window.close();
                setTimeout(() => { window.location.href = "about:blank"; }, 100);
            }, 800);
        }
    </script>
</body>
</html>

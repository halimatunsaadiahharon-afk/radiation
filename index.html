<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>Gimik Pelancaran Korporat - ICoRSSIHS 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body, html { 
            margin: 0; padding: 0; height: 100%; 
            font-family: 'Montserrat', sans-serif; 
            overflow: hidden; background: #000; color: #fff; cursor: pointer; 
            -webkit-tap-highlight-color: transparent;
        }
        
        /* Splash Screen Mobile Fix */
        #setup-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; z-index: 99999; display: flex; justify-content: center; align-items: center; 
        }
        #setup-overlay img { width: 100%; height: 100%; object-fit: cover; object-position: center; }

        /* Exit Button Fix */
        #exit-btn {
            position: fixed; top: 20px; right: 20px; z-index: 100000;
            width: 50px; height: 50px; background: rgba(255, 0, 0, 0.8);
            border: 2px solid white; border-radius: 50%;
            color: white; font-weight: bold; font-size: 20px;
            display: flex; justify-content: center; align-items: center;
            opacity: 0; transition: opacity 1s; visibility: hidden;
        }

        #main-container { 
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; 
            z-index: 10; display: flex; justify-content: center; align-items: center;
        }

        .fullscreen-content {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: none; z-index: 1;
        }

        /* --- 10 ANIMASI BUKU KORPORAT (30 SAAT) --- */
        #book-launch-layer {
            display: none; justify-content: center; align-items: center;
            z-index: 20; background: radial-gradient(circle, #0d1b33 0%, #000 100%);
            perspective: 2500px;
        }

        .book-container {
            width: 70vw; max-width: 320px; aspect-ratio: 320/460;
            position: relative; transform-style: preserve-3d; opacity: 0;
        }

        .book-img { width: 100%; height: 100%; object-fit: cover; box-shadow: 0 0 80px rgba(0, 150, 255, 0.7); border: 1px solid rgba(255, 255, 255, 0.4); }

        .corporate-montage {
            animation: 
                st1 3s forwards, st2 3s 3s forwards, st3 3s 6s forwards, st4 3s 9s forwards,
                st5 3s 12s forwards, st6 3s 15s forwards, st7 3s 18s forwards,
                st8 3s 21s forwards, st9 3s 24s forwards, st10 3s 27s forwards;
        }

        @keyframes st1 { 0% { opacity: 0; transform: scale(0.3) translateY(500px); } 100% { opacity: 1; transform: scale(1) translateY(0); } }
        @keyframes st2 { 0% { transform: rotateY(0deg); } 100% { transform: rotateY(360deg); } }
        @keyframes st3 { 0% { transform: rotateY(0deg); } 100% { transform: rotateY(180deg) translateZ(50px); } }
        @keyframes st4 { 0% { transform: scale(1); } 50% { transform: scale(1.3); } 100% { transform: scale(1.1); } }
        @keyframes st5 { 0% { transform: rotateX(0deg); } 50% { transform: rotateX(90deg); filter: brightness(2); } 100% { transform: rotateX(0deg); } }
        @keyframes st6 { 0% { transform: rotateX(0deg); } 100% { transform: rotateX(180deg); } }
        @keyframes st7 { 0% { transform: rotateX(10deg); } 100% { transform: rotateX(-10deg) rotateY(-10deg); } }
        @keyframes st8 { 0% { transform: scale(1); } 100% { transform: scale(1.3); box-shadow: 0 0 100px #0096ff; } }
        @keyframes st9 { 0%, 100% { transform: scale(1.3) rotateZ(0); } 50% { transform: scale(1.3) rotateZ(5deg); } }
        @keyframes st10 { 0% { opacity: 1; transform: scale(1.3); } 100% { opacity: 0; transform: scale(0.5); } }

        /* --- WORDING PERASMIAN --- */
        #official-card-container { 
            display: none; opacity: 0; transition: opacity 1.5s; 
            width: 100%; height: 100%; justify-content: center; align-items: center; 
            position: absolute; top: 0; left: 0; z-index: 100; background: #050a14;
        }
        
        .official-card { background: rgba(10, 20, 38, 0.95); border-radius: 20px; padding: 30px; text-align: center; width: 85%; max-width: 1000px; border: 1px solid rgba(255,255,255,0.1); }
        .reveal { opacity: 0; transform: translateY(20px); animation: fadeInUp 1s ease forwards; }
        @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }

        .glow-text {
            background: linear-gradient(90deg, #fff, #4facfe, #00f2fe, #ffd3a5, #fff);
            background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: textShine 5s linear infinite; display: inline-block;
        }
        @keyframes textShine { to { background-position: 200% center; } }

        .conf-title { font-size: clamp(0.7rem, 2vw, 1.5rem); text-transform: uppercase; letter-spacing: 2px; }
        .main-theme-box { font-size: clamp(1.2rem, 4vw, 3.2rem); font-weight: 900; text-transform: uppercase; margin: 15px 0; }
        .vip-name { font-size: clamp(1.1rem, 3vw, 2.2rem); font-weight: 700; margin: 5px 0; color: #fff; }
    </style>
</head>
<body> 

    <div id="setup-overlay" onclick="startScene()">
        <img src="ppp.jpg" alt="ppp">
        <p style="position: absolute; bottom: 20%; color: white; letter-spacing: 2px;">KLIK UNTUK MULA</p>
    </div>
    
    <div id="exit-btn" onclick="exitSystem(event)">X</div>
    
    <audio id="book-sound" preload="auto" loop><source src="bookaudio.mp3" type="audio/mpeg"></audio>
    <audio id="final-sound" preload="auto"><source src="audio3.mp3" type="audio/mpeg"></audio>

    <div id="main-container" onclick="handleScreenClick(event)">
        <video id="vid-place" class="fullscreen-content" src="place.mp4" playsinline loop></video>
        <video id="vid-access" class="fullscreen-content" src="access.mp4" playsinline></video>

        <div id="book-launch-layer" class="fullscreen-content">
            <div id="book-obj" class="book-container"><img src="cover.jpg" class="book-img" alt="Cover"></div>
        </div>

        <div id="official-card-container">
            <div class="official-card">
                <div class="reveal" style="animation-delay: 0.5s;">
                    <div class="conf-title">6th International Conference On</div>
                    <div class="conf-title" style="font-weight: 700;">Radiation Safety and Security In Healthcare Services (ICoRSSIHS) 2026</div>
                </div>
                <div class="reveal main-theme-box" style="animation-delay: 1.5s;">
                    <span class="glow-text">Synergizing Science, Technology<br>And Clinical Practice Through AI</span>
                </div>
                <div class="reveal" style="animation-delay: 2.5s;">
                    <div style="color: #00f2fe; letter-spacing: 5px; font-size: 0.8rem;">DIRASMIKAN OLEH</div>
                    <div class="vip-name">DR SELVANAAYAGAM SHANMUGANATHAN</div>
                    <div style="color: #b0c4de; font-size: 0.9rem;">Pengarah Hospital Baling</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const vidPlace = document.getElementById('vid-place');
        const vidAccess = document.getElementById('vid-access');
        const bookLayer = document.getElementById('book-launch-layer');
        const bookObj = document.getElementById('book-obj');
        const bookSound = document.getElementById('book-sound');
        const finalSound = document.getElementById('final-sound');
        const cardContainer = document.getElementById('official-card-container');
        const exitBtn = document.getElementById('exit-btn');

        let currentPhase = 0; 

        function startScene() {
            // UNLOCK SEMUA AUDIO (WAJIB UNTUK MOBILE)
            bookSound.play().then(() => { bookSound.pause(); bookSound.currentTime = 0; }).catch(e => console.log("Unlock failed"));
            finalSound.play().then(() => { finalSound.pause(); finalSound.currentTime = 0; }).catch(e => console.log("Unlock failed"));

            document.getElementById('setup-overlay').style.display = 'none';
            exitBtn.style.visibility = 'visible';
            exitBtn.style.opacity = '1'; 
            
            const elem = document.documentElement;
            if (elem.requestFullscreen) { elem.requestFullscreen(); } 
            else if (elem.webkitRequestFullscreen) { elem.webkitRequestFullscreen(); } 

            currentPhase = 1; 
            vidPlace.style.display = 'block'; 
            vidPlace.play();
        }

        function handleScreenClick(event) {
            if (currentPhase === 1) {
                vidPlace.pause(); vidPlace.style.display = 'none';
                currentPhase = 2; 
                vidAccess.style.display = 'block'; 
                vidAccess.play();
            } else if (currentPhase === 4) {
                exitSystem(event);
            }
        }

        vidAccess.onended = () => {
            vidAccess.style.display = 'none';
            currentPhase = 3;
            bookLayer.style.display = 'flex';
            bookObj.classList.add('corporate-montage');
            
            // MAIN AUDIO BUKU
            bookSound.play();

            setTimeout(() => {
                bookSound.pause(); 
                bookLayer.style.display = 'none';
                showOfficialCard();
            }, 30000); 
        };

        function showOfficialCard() {
            currentPhase = 4;
            cardContainer.style.display = 'flex';
            void cardContainer.offsetWidth; 
            cardContainer.style.opacity = '1';
            finalSound.play();
        }

        function exitSystem(e) {
            if (e) e.stopPropagation();
            
            // Hentikan semua media
            vidPlace.pause(); vidAccess.pause(); bookSound.pause(); finalSound.pause();

            // Skrin Hitam Serta Merta
            document.body.innerHTML = ""; 
            document.body.style.background = "black";
            
            // Cuba Exit Fullscreen
            if (document.exitFullscreen) { document.exitFullscreen().catch(() => {}); }
            else if (document.webkitExitFullscreen) { document.webkitExitFullscreen(); }

            // Cuba tutup atau reload ke blank
            setTimeout(() => {
                window.location.href = "about:blank";
                window.close(); 
            }, 300);
        }
    </script>
</body>
</html>
